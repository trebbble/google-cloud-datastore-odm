name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering

jobs:
  quality:
      name: Lint with Ruff
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
            enable-cache: true
        - name: Run Ruff
          run: uvx ruff check --output-format=github .

  test:
     needs: quality
     runs-on: ubuntu-latest
     strategy:
       matrix:
         python-version: ["3.12"]

     steps:
       - uses: actions/checkout@v6
       - name: Install uv
         uses: astral-sh/setup-uv@v7
         with:
           enable-cache: true

       - name: Set up Python ${{ matrix.python-version }}
         uses: actions/setup-python@v5
         with:
           python-version: ${{ matrix.python-version }}

       - name: Install dependencies
         run: uv sync

       - name: Start Datastore Emulator
         run: |
           docker compose -f docker-compose.yml up -d datastore-test

       - name: Run tests
         env:
           DATASTORE_EMULATOR_HOST: localhost:10001
           GOOGLE_CLOUD_PROJECT: google-cloud-datastore-odm-test
         run: uv run pytest
