name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering

jobs:
  quality:
      name: Lint with Ruff
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
            enable-cache: true
        - name: Run Ruff
          run: uvx ruff check --output-format=github .

  test:
     needs: quality
     runs-on: ubuntu-latest
     permissions:
       contents: write
     strategy:
       matrix:
         python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

     steps:
       - uses: actions/checkout@v6
       - name: Install uv
         uses: astral-sh/setup-uv@v7
         with:
           enable-cache: true

       - name: Set up Python ${{ matrix.python-version }}
         uses: actions/setup-python@v6
         with:
           python-version: ${{ matrix.python-version }}

       - name: Install dependencies
         run: uv sync

       - name: Start Datastore Emulator
         run: |
           docker compose -f docker-compose.yml up -d datastore-test

       - name: Run tests with coverage
         env:
           DATASTORE_EMULATOR_HOST: localhost:10001
           GOOGLE_CLOUD_PROJECT: google-cloud-datastore-odm-test
         run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

       - name: Generate Coverage Badge
         if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
         run: uv run genbadge coverage -i coverage.xml -o coverage.svg

       - name: Commit Coverage Badge
         if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
         uses: stefanzweifel/git-auto-commit-action@v5
         with:
           commit_message: "chore: auto-update coverage badge [skip ci]"
           file_pattern: coverage.svg
